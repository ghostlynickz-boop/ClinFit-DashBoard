<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClinFit — Clientes</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/clinfit.js"></script>
</head>
<body>

<div class="layout">

  <!-- ══════════ SIDEBAR ══════════ -->
  <aside class="sidebar">
    <div class="sidebar__logo"><img src="assets/logo.png" alt="ClinFit" /></div>
    <div class="sidebar__user">
      <div class="sidebar__avatar" id="sidebar-avatar">U</div>
      <div>
        <div class="sidebar__username" id="sidebar-username">Carregando...</div>
        <div class="sidebar__role" id="sidebar-email"></div>
      </div>
    </div>
    <nav class="sidebar__nav">
      <a href="app.html"        class="nav-item" id="nav-dashboard">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
      <a href="clientes.html"   class="nav-item" id="nav-clientes">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Clientes</a>
      <a href="agenda.html"     class="nav-item" id="nav-agenda">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Agenda</a>
      <a href="financeiro.html" class="nav-item" id="nav-financeiro">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Financeiro</a>
      <a href="evolucao.html"   class="nav-item" id="nav-evolucao">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Evolução</a>
    </nav>
    <div class="sidebar__footer">
      <button class="btn-logout" id="btn-logout">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sair</button>
    </div>
  </aside>

  <!-- ══════════ MAIN ══════════ -->
  <main class="main">
    <div class="main-header">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="mobile-menu-btn" id="mobile-menu-btn">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <h1>Clientes</h1>
          <p id="current-date"></p>
        </div>
      </div>
    </div>

    <div class="main-content">

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="search-box">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="busca" class="form-control" placeholder="Buscar cliente..." />
        </div>
        <div style="display:flex;gap:10px;align-items:center">
          <select id="filtro-status" class="form-control" style="width:auto">
            <option value="">Todos os status</option>
            <option value="ativo">Ativo</option>
            <option value="inativo">Inativo</option>
          </select>
          <button class="btn btn-primary" id="btn-novo-cliente">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Novo Cliente
          </button>
        </div>
      </div>

      <!-- Grid de clientes -->
      <div class="clientes-grid" id="clientes-grid">
        <div class="empty-state" style="grid-column:1/-1">
          <div class="loader"></div>
          <p>Carregando clientes...</p>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- ══════════ MODAL CADASTRO/EDIÇÃO ══════════ -->
<div class="modal-overlay" id="modal-cliente">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Novo Cliente</h2>
      <button class="modal-close" id="modal-close">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="cliente-id" />

      <div class="form-row">
        <div class="form-group">
          <label for="c-nome">Nome completo *</label>
          <input type="text" id="c-nome" class="form-control" placeholder="Ex: Maria Silva" required />
        </div>
        <div class="form-group">
          <label for="c-telefone">Telefone</label>
          <input type="tel" id="c-telefone" class="form-control" placeholder="(11) 99999-9999" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="c-email">E-mail</label>
          <input type="email" id="c-email" class="form-control" placeholder="cliente@email.com" />
        </div>
        <div class="form-group">
          <label for="c-nascimento">Data de nascimento</label>
          <input type="date" id="c-nascimento" class="form-control" />
        </div>
      </div>

      <div class="form-group">
        <label for="c-objetivo">Objetivo</label>
        <input type="text" id="c-objetivo" class="form-control" placeholder="Ex: Emagrecimento, hipertrofia, reabilitação..." />
      </div>

      <div class="form-group">
        <label for="c-obs">Observações</label>
        <textarea id="c-obs" class="form-control" placeholder="Restrições, condições de saúde, etc."></textarea>
      </div>

      <div class="form-group">
        <label for="c-status">Status</label>
        <select id="c-status" class="form-control">
          <option value="ativo">Ativo</option>
          <option value="inativo">Inativo</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="modal-cancel">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar-cliente">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Salvar
      </button>
    </div>
  </div>
</div>

<!-- ══════════ MODAL FICHA DO CLIENTE ══════════ -->
<div class="modal-overlay" id="modal-ficha">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2 id="ficha-nome">Ficha do Cliente</h2>
      <button class="modal-close" id="ficha-close">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="ficha-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="ficha-fechar">Fechar</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>

  let userId = null;
  let clientes = [];

  (async () => {
    const auth = await CF.initPage('nav-clientes');
    if (!auth) return;
    userId = auth.user.id;
    await carregarClientes();
  })();

  // ── Carregar clientes ──────────────────────────────────────────────────
  async function carregarClientes() {
    const { data, error } = await _sb
      .from('clientes')
      .select('*')
      .eq('usuario_id', userId)
      .order('nome');

    if (error) {
      CF.toast('Erro ao carregar clientes.', 'error');
      return;
    }

    clientes = data || [];
    renderClientes(clientes);
  }

  function renderClientes(lista) {
    const grid = document.getElementById('clientes-grid');
    if (!lista.length) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <p>Nenhum cliente cadastrado</p>
          <button class="btn btn-primary btn-sm" onclick="document.getElementById('btn-novo-cliente').click()">Adicionar primeiro cliente</button>
        </div>`;
      return;
    }

    grid.innerHTML = lista.map(c => `
      <div class="cliente-card fade-in">
        <div class="cliente-card__header">
          <div class="cliente-avatar">${CF.initials(c.nome)}</div>
          <div>
            <div class="cliente-card__name">${c.nome}</div>
            <div class="cliente-card__objective">${c.objetivo || 'Sem objetivo definido'}</div>
          </div>
          <span class="badge ${c.status === 'ativo' ? 'badge-green' : 'badge-gray'}" style="margin-left:auto">${c.status}</span>
        </div>

        ${c.telefone ? `
        <div class="cliente-card__info">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.9a16 16 0 0 0 6 6l.92-.92a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16.92z"/></svg>
          ${CF.phone(c.telefone)}
        </div>` : ''}

        <div class="cliente-card__actions">
          <button class="btn btn-outline btn-sm" onclick="abrirFicha('${c.id}')">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            Ver ficha
          </button>
          <button class="btn btn-outline btn-sm" onclick="abrirEdicao('${c.id}')">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Editar
          </button>
          <button class="btn btn-danger btn-sm" onclick="excluirCliente('${c.id}', '${c.nome.replace(/'/g,"\\'")}')">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            Excluir
          </button>
        </div>
      </div>`).join('');
  }

  // ── Busca e filtro ─────────────────────────────────────────────────────
  function filtrar() {
    const q      = document.getElementById('busca').value.toLowerCase();
    const status = document.getElementById('filtro-status').value;
    const lista  = clientes.filter(c =>
      c.nome.toLowerCase().includes(q) &&
      (!status || c.status === status)
    );
    renderClientes(lista);
  }

  document.getElementById('busca').addEventListener('input', filtrar);
  document.getElementById('filtro-status').addEventListener('change', filtrar);

  // ── Modal abertura/fechamento ──────────────────────────────────────────
  function abrirModal() {
    document.getElementById('modal-cliente').classList.add('open');
  }

  function fecharModal() {
    document.getElementById('modal-cliente').classList.remove('open');
    limparFormulario();
  }

  function limparFormulario() {
    ['cliente-id','c-nome','c-telefone','c-email','c-nascimento','c-objetivo','c-obs'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    document.getElementById('c-status').value = 'ativo';
    document.getElementById('modal-title').textContent = 'Novo Cliente';
  }

  document.getElementById('btn-novo-cliente').addEventListener('click', () => {
    limparFormulario();
    abrirModal();
  });

  document.getElementById('modal-close').addEventListener('click', fecharModal);
  document.getElementById('modal-cancel').addEventListener('click', fecharModal);
  document.getElementById('modal-cliente').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) fecharModal();
  });

  // ── Editar ─────────────────────────────────────────────────────────────
  window.abrirEdicao = (id) => {
    const c = clientes.find(x => x.id === id);
    if (!c) return;

    document.getElementById('cliente-id').value   = c.id;
    document.getElementById('c-nome').value       = c.nome || '';
    document.getElementById('c-telefone').value   = c.telefone || '';
    document.getElementById('c-email').value      = c.email || '';
    document.getElementById('c-nascimento').value = c.data_nascimento || '';
    document.getElementById('c-objetivo').value   = c.objetivo || '';
    document.getElementById('c-obs').value        = c.observacoes || '';
    document.getElementById('c-status').value     = c.status || 'ativo';
    document.getElementById('modal-title').textContent = 'Editar Cliente';

    abrirModal();
  };

  // ── Salvar ─────────────────────────────────────────────────────────────
  document.getElementById('btn-salvar-cliente').addEventListener('click', async () => {
    const btn    = document.getElementById('btn-salvar-cliente');
    const id     = document.getElementById('cliente-id').value;
    const nome   = document.getElementById('c-nome').value.trim();

    if (!nome) {
      CF.toast('O nome do cliente é obrigatório.', 'error');
      return;
    }

    const payload = {
      usuario_id:      userId,
      nome,
      telefone:        document.getElementById('c-telefone').value.trim() || null,
      email:           document.getElementById('c-email').value.trim() || null,
      data_nascimento: document.getElementById('c-nascimento').value || null,
      objetivo:        document.getElementById('c-objetivo').value.trim() || null,
      observacoes:     document.getElementById('c-obs').value.trim() || null,
      status:          document.getElementById('c-status').value
    };

    CF.loading(btn, true);

    try {
      if (id) {
        const { error } = await _sb.from('clientes').update(payload).eq('id', id);
        if (error) throw error;
        CF.toast('Cliente atualizado com sucesso!', 'success');
      } else {
        const { error } = await _sb.from('clientes').insert(payload);
        if (error) throw error;
        CF.toast('Cliente cadastrado com sucesso!', 'success');
      }
      fecharModal();
      await carregarClientes();
    } catch (err) {
      CF.toast(`Erro ao salvar: ${err.message}`, 'error');
    } finally {
      CF.loading(btn, false);
    }
  });

  // ── Excluir ────────────────────────────────────────────────────────────
  window.excluirCliente = async (id, nome) => {
    if (!confirm(`Deseja excluir o cliente "${nome}"?\n\nEsta ação não pode ser desfeita.`)) return;

    const { error } = await _sb.from('clientes').delete().eq('id', id);
    if (error) {
      CF.toast('Erro ao excluir cliente.', 'error');
      return;
    }
    CF.toast('Cliente excluído.', 'info');
    await carregarClientes();
  };

  // ── Ficha do cliente ───────────────────────────────────────────────────
  window.abrirFicha = async (id) => {
    const c = clientes.find(x => x.id === id);
    if (!c) return;

    document.getElementById('ficha-nome').textContent = c.nome;
    document.getElementById('ficha-body').innerHTML = `<div class="loader" style="margin:20px auto"></div>`;
    document.getElementById('modal-ficha').classList.add('open');

    // Busca sessões e evolução do cliente
    const [{ data: sessoes }, { data: evolucao }] = await Promise.all([
      _sb.from('sessoes').select('*').eq('cliente_id', id).order('data', { ascending: false }).limit(10),
      _sb.from('evolucao').select('*').eq('cliente_id', id).order('data', { ascending: false }).limit(5)
    ]);

    const idade = c.data_nascimento
      ? Math.floor((Date.now() - new Date(c.data_nascimento)) / (365.25 * 24 * 3600 * 1000)) + ' anos'
      : '—';

    document.getElementById('ficha-body').innerHTML = `
      <div class="ficha-section">
        <h3>Dados Pessoais</h3>
        <div class="info-grid">
          <div class="info-item"><label>Nome</label><span>${c.nome}</span></div>
          <div class="info-item"><label>Telefone</label><span>${CF.phone(c.telefone)}</span></div>
          <div class="info-item"><label>E-mail</label><span>${c.email || '—'}</span></div>
          <div class="info-item"><label>Data de Nascimento</label><span>${CF.date(c.data_nascimento)} (${idade})</span></div>
          <div class="info-item"><label>Objetivo</label><span>${c.objetivo || '—'}</span></div>
          <div class="info-item"><label>Status</label><span class="badge ${c.status === 'ativo' ? 'badge-green' : 'badge-gray'}">${c.status}</span></div>
        </div>
        ${c.observacoes ? `<div style="margin-top:12px;font-size:13px;color:var(--text-muted)"><strong>Obs:</strong> ${c.observacoes}</div>` : ''}
      </div>

      <div class="ficha-section">
        <h3>Últimas Sessões</h3>
        ${sessoes?.length ? `
          <div class="table-wrapper">
            <table>
              <thead><tr><th>Data</th><th>Horário</th><th>Tipo</th><th>Status</th></tr></thead>
              <tbody>
                ${sessoes.map(s => `
                  <tr>
                    <td>${CF.date(s.data)}</td>
                    <td>${s.horario?.slice(0,5) || '—'}</td>
                    <td>${s.tipo || '—'}</td>
                    <td><span class="badge ${s.status === 'confirmada' ? 'badge-green' : s.status === 'cancelada' ? 'badge-red' : 'badge-gray'}">${s.status}</span></td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>` : '<p class="text-muted text-sm">Nenhuma sessão registrada.</p>'}
      </div>

      <div class="ficha-section">
        <h3>Últimos Registros de Evolução</h3>
        ${evolucao?.length ? `
          <div class="table-wrapper">
            <table>
              <thead><tr><th>Data</th><th>Peso (kg)</th><th>% Gordura</th><th>Cintura</th><th>Quadril</th></tr></thead>
              <tbody>
                ${evolucao.map(e => `
                  <tr>
                    <td>${CF.date(e.data)}</td>
                    <td>${e.peso ?? '—'}</td>
                    <td>${e.gordura ?? '—'}</td>
                    <td>${e.cintura ?? '—'}</td>
                    <td>${e.quadril ?? '—'}</td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>` : '<p class="text-muted text-sm">Nenhum registro de evolução.</p>'}
      </div>`;
  };

  document.getElementById('ficha-close').addEventListener('click', () =>
    document.getElementById('modal-ficha').classList.remove('open'));
  document.getElementById('ficha-fechar').addEventListener('click', () =>
    document.getElementById('modal-ficha').classList.remove('open'));
  document.getElementById('modal-ficha').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) document.getElementById('modal-ficha').classList.remove('open');
  });
</script>

</body>
</html>
