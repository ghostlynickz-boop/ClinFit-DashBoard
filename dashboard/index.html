<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClinFit — Entrar</title>
  <link rel="stylesheet" href="css/style.css" />

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <img src="assets/logo.png" alt="ClinFit" />
    </div>

    <h1 class="login-title">Bem-vindo de volta</h1>
    <p class="login-subtitle">Acesse sua plataforma de gestão</p>

    <!-- Mensagem de erro -->
    <div class="login-error" id="login-error"></div>

    <!-- Formulário -->
    <form class="login-form" id="login-form" novalidate>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input
          type="email"
          id="email"
          class="form-control"
          placeholder="seu@email.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input
          type="password"
          id="senha"
          class="form-control"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="btn btn-primary login-btn" id="btn-login">
        Entrar
      </button>

    </form>

    <p class="login-help">
      Problemas para acessar?
      <a href="mailto:suporte@clinfit.com.br">Entre em contato</a>
    </p>

  </div>
</div>

<script type="module">
  import { login, getUser, showToast, setLoading } from './js/auth.js';

  // Se já estiver logado, redireciona direto para o dashboard
  (async () => {
    const user = await getUser();
    if (user) window.location.href = 'app.html';
  })();

  // Lida com o submit do formulário
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email   = document.getElementById('email').value.trim();
    const senha   = document.getElementById('senha').value;
    const btn     = document.getElementById('btn-login');
    const errDiv  = document.getElementById('login-error');

    // Validação básica
    if (!email || !senha) {
      errDiv.textContent = 'Preencha o e-mail e a senha.';
      errDiv.classList.add('show');
      return;
    }

    errDiv.classList.remove('show');
    setLoading(btn, true);

    try {
      await login(email, senha);
      window.location.href = 'app.html';
    } catch (err) {
      setLoading(btn, false);

      // Traduz mensagens comuns do Supabase
      let msg = 'Erro ao entrar. Tente novamente.';
      if (err.message?.includes('Invalid login'))  msg = 'E-mail ou senha incorretos.';
      if (err.message?.includes('Email not confirmed')) msg = 'Confirme seu e-mail antes de entrar.';
      if (err.message?.includes('Too many requests')) msg = 'Muitas tentativas. Aguarde um momento.';

      errDiv.textContent = msg;
      errDiv.classList.add('show');
    }
  });
</script>

</body>
</html>
