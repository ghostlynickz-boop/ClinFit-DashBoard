<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClinFit — Agenda</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/clinfit.js"></script>
</head>
<body>

<div class="layout">

  <!-- ══════════ SIDEBAR ══════════ -->
  <aside class="sidebar">
    <div class="sidebar__logo"><img src="assets/logo.png" alt="ClinFit" /></div>
    <div class="sidebar__user">
      <div class="sidebar__avatar" id="sidebar-avatar">U</div>
      <div>
        <div class="sidebar__username" id="sidebar-username">Carregando...</div>
        <div class="sidebar__role" id="sidebar-email"></div>
      </div>
    </div>
    <nav class="sidebar__nav">
      <a href="app.html"        class="nav-item" id="nav-dashboard">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
      <a href="clientes.html"   class="nav-item" id="nav-clientes">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Clientes</a>
      <a href="agenda.html"     class="nav-item" id="nav-agenda">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Agenda</a>
      <a href="financeiro.html" class="nav-item" id="nav-financeiro">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Financeiro</a>
      <a href="evolucao.html"   class="nav-item" id="nav-evolucao">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Evolução</a>
      <a href="configuracoes.html" class="nav-item" id="nav-configuracoes">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Configurações</a>
    </nav>
    <div class="sidebar__footer">
      <button class="btn-logout" id="btn-logout">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sair</button>
    </div>
  </aside>

  <!-- ══════════ MAIN ══════════ -->
  <main class="main">
    <div class="main-header">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="mobile-menu-btn" id="mobile-menu-btn">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <h1>Agenda</h1>
          <p id="current-date"></p>
        </div>
      </div>
      <button class="btn btn-primary" id="btn-nova-sessao">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nova Sessão
      </button>
    </div>

    <div class="main-content">

      <!-- Navegação de semana -->
      <div class="week-nav">
        <button class="btn btn-outline btn-sm" id="btn-semana-ant">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span id="semana-label">—</span>
        <button class="btn btn-outline btn-sm" id="btn-semana-prox">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <button class="btn btn-secondary btn-sm" id="btn-hoje">Hoje</button>
      </div>

      <!-- Legenda -->
      <div style="display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap">
        <span style="font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:6px">
          <span style="width:10px;height:10px;border-radius:2px;background:var(--green-light);border-left:3px solid var(--green);display:inline-block"></span>Confirmada
        </span>
        <span style="font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:6px">
          <span style="width:10px;height:10px;border-radius:2px;background:rgba(107,114,128,0.15);border-left:3px solid var(--text-dim);display:inline-block"></span>Realizada
        </span>
        <span style="font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:6px">
          <span style="width:10px;height:10px;border-radius:2px;background:var(--red-bg);border-left:3px solid var(--red);display:inline-block"></span>Cancelada
        </span>
      </div>

      <!-- Grade semanal -->
      <div class="week-grid" id="week-grid"></div>

    </div>
  </main>
</div>

<!-- ══════════ MODAL SESSÃO ══════════ -->
<div class="modal-overlay" id="modal-sessao">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-sessao-title">Nova Sessão</h2>
      <button class="modal-close" id="modal-sessao-close">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="sessao-id" />

      <div class="form-group">
        <label for="s-cliente">Cliente *</label>
        <select id="s-cliente" class="form-control">
          <option value="">Selecione um cliente...</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="s-data">Data *</label>
          <input type="date" id="s-data" class="form-control" required />
        </div>
        <div class="form-group">
          <label for="s-horario">Horário *</label>
          <input type="time" id="s-horario" class="form-control" required />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="s-duracao">Duração (min)</label>
          <input type="number" id="s-duracao" class="form-control" value="50" min="15" max="180" />
        </div>
        <div class="form-group">
          <label for="s-tipo">Tipo</label>
          <select id="s-tipo" class="form-control">
            <option value="presencial">Presencial</option>
            <option value="online">Online</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="s-status">Status</label>
        <select id="s-status" class="form-control">
          <option value="confirmada">Confirmada</option>
          <option value="realizada">Realizada</option>
          <option value="cancelada">Cancelada</option>
        </select>
      </div>

      <div class="form-group">
        <label for="s-obs">Observações</label>
        <textarea id="s-obs" class="form-control" placeholder="Anotações sobre a sessão..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="btn-excluir-sessao" style="margin-right:auto;display:none">Excluir</button>
      <button class="btn btn-secondary" id="modal-sessao-cancel">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar-sessao">Salvar</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>

  let userId   = null;
  let clientes = [];
  let sessoes  = [];
  let semanaOffset = 0; // 0 = semana atual

  (async () => {
    const auth = await CF.initPage('nav-agenda');
    if (!auth) return;
    userId = auth.user.id;

    await carregarClientes();
    renderSemana();
    await carregarSessoes();
  })();

  // ── Semana ──────────────────────────────────────────────────────────────
  function getInicioSemana(offset = 0) {
    const hoje = new Date();
    const dia  = hoje.getDay(); // 0=dom
    const lun  = new Date(hoje);
    lun.setDate(hoje.getDate() - (dia === 0 ? 6 : dia - 1) + offset * 7);
    lun.setHours(0,0,0,0);
    return lun;
  }

  function toISO(date) {
    return date.toISOString().split('T')[0];
  }

  function renderSemana() {
    const inicio = getInicioSemana(semanaOffset);
    const fim    = new Date(inicio); fim.setDate(inicio.getDate() + 6);
    const hoje   = toISO(new Date());

    const meses  = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    const label  = `${inicio.getDate()} ${meses[inicio.getMonth()]} — ${fim.getDate()} ${meses[fim.getMonth()]} ${fim.getFullYear()}`;
    document.getElementById('semana-label').textContent = label;

    const dias = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
    const grid = document.getElementById('week-grid');
    grid.innerHTML = '';

    for (let i = 0; i < 7; i++) {
      const d = new Date(inicio); d.setDate(inicio.getDate() + i);
      const iso = toISO(d);
      const isHoje = iso === hoje;

      const col = document.createElement('div');
      col.className = `day-col${isHoje ? ' today' : ''}`;
      col.dataset.date = iso;

      col.innerHTML = `
        <div class="day-header">
          <div class="day-name">${dias[i]}</div>
          <div class="day-number">${d.getDate()}</div>
        </div>
        <div class="day-sessions" id="day-${iso}"></div>`;

      grid.appendChild(col);
    }

    renderSessoesSemana();
  }

  function renderSessoesSemana() {
    // Limpa slots
    document.querySelectorAll('.day-sessions').forEach(el => el.innerHTML = '');

    sessoes.forEach(s => {
      const slot = document.getElementById(`day-${s.data}`);
      if (!slot) return;

      const cliente = clientes.find(c => c.id === s.cliente_id);
      const div = document.createElement('div');
      div.className = `agenda-session ${s.status}`;
      div.innerHTML = `
        <div class="s-time">${CF.sanitize(s.horario?.slice(0,5) || '—')}</div>
        <div class="s-name">${CF.sanitize(cliente?.nome || '—')}</div>`;
      div.title = `${CF.sanitize(cliente?.nome || '—')} · ${CF.sanitize(s.tipo || '—')} · ${CF.sanitize(String(s.duracao || ''))}min`;
      div.addEventListener('click', () => abrirEdicaoSessao(s.id));
      slot.appendChild(div);
    });
  }

  // ── Carregar dados ──────────────────────────────────────────────────────
  async function carregarClientes() {
    const { data } = await _sb
      .from('clientes')
      .select('id, nome')
      .eq('usuario_id', userId)
      .eq('status', 'ativo')
      .order('nome');
    clientes = data || [];

    const sel = document.getElementById('s-cliente');
    sel.innerHTML = '<option value="">Selecione um cliente...</option>' +
      clientes.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
  }

  async function carregarSessoes() {
    const inicio = getInicioSemana(semanaOffset);
    const fim    = new Date(inicio); fim.setDate(inicio.getDate() + 6);

    const { data, error } = await _sb
      .from('sessoes')
      .select('*')
      .eq('usuario_id', userId)
      .gte('data', toISO(inicio))
      .lte('data', toISO(fim))
      .order('horario');

    if (error) { CF.toast('Erro ao carregar sessões.', 'error'); return; }
    sessoes = data || [];
    renderSessoesSemana();
  }

  // ── Navegação ───────────────────────────────────────────────────────────
  document.getElementById('btn-semana-ant').addEventListener('click', async () => {
    semanaOffset--;
    renderSemana();
    await carregarSessoes();
  });

  document.getElementById('btn-semana-prox').addEventListener('click', async () => {
    semanaOffset++;
    renderSemana();
    await carregarSessoes();
  });

  document.getElementById('btn-hoje').addEventListener('click', async () => {
    semanaOffset = 0;
    renderSemana();
    await carregarSessoes();
  });

  // ── Modal ───────────────────────────────────────────────────────────────
  function abrirModal() { document.getElementById('modal-sessao').classList.add('open'); }
  function fecharModal() {
    document.getElementById('modal-sessao').classList.remove('open');
    limparForm();
  }

  function limparForm() {
    document.getElementById('sessao-id').value  = '';
    document.getElementById('s-cliente').value  = '';
    document.getElementById('s-data').value     = toISO(new Date());
    document.getElementById('s-horario').value  = '';
    document.getElementById('s-duracao').value  = '50';
    document.getElementById('s-tipo').value     = 'presencial';
    document.getElementById('s-status').value   = 'confirmada';
    document.getElementById('s-obs').value      = '';
    document.getElementById('modal-sessao-title').textContent = 'Nova Sessão';
    document.getElementById('btn-excluir-sessao').style.display = 'none';
  }

  document.getElementById('btn-nova-sessao').addEventListener('click', () => {
    limparForm();
    abrirModal();
  });

  document.getElementById('modal-sessao-close').addEventListener('click', fecharModal);
  document.getElementById('modal-sessao-cancel').addEventListener('click', fecharModal);
  document.getElementById('modal-sessao').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) fecharModal();
  });

  // ── Editar sessão ───────────────────────────────────────────────────────
  window.abrirEdicaoSessao = (id) => {
    const s = sessoes.find(x => x.id === id);
    if (!s) return;

    document.getElementById('sessao-id').value  = s.id;
    document.getElementById('s-cliente').value  = s.cliente_id || '';
    document.getElementById('s-data').value     = s.data || '';
    document.getElementById('s-horario').value  = s.horario?.slice(0,5) || '';
    document.getElementById('s-duracao').value  = s.duracao || 50;
    document.getElementById('s-tipo').value     = s.tipo || 'presencial';
    document.getElementById('s-status').value   = s.status || 'confirmada';
    document.getElementById('s-obs').value      = s.observacoes || '';
    document.getElementById('modal-sessao-title').textContent = 'Editar Sessão';
    document.getElementById('btn-excluir-sessao').style.display = 'inline-flex';

    abrirModal();
  };

  // ── Salvar ──────────────────────────────────────────────────────────────
  document.getElementById('btn-salvar-sessao').addEventListener('click', async () => {
    const btn      = document.getElementById('btn-salvar-sessao');
    const id       = document.getElementById('sessao-id').value;
    const clienteId = document.getElementById('s-cliente').value;
    const data     = document.getElementById('s-data').value;
    const horario  = document.getElementById('s-horario').value;

    if (!clienteId || !data || !horario) {
      CF.toast('Preencha cliente, data e horário.', 'error');
      return;
    }

    const payload = {
      usuario_id:  userId,
      cliente_id:  clienteId,
      data,
      horario,
      duracao:     parseInt(document.getElementById('s-duracao').value) || 50,
      tipo:        document.getElementById('s-tipo').value,
      status:      document.getElementById('s-status').value,
      observacoes: document.getElementById('s-obs').value.trim() || null
    };

    CF.loading(btn, true);
    try {
      if (id) {
        const { error } = await _sb.from('sessoes').update(payload).eq('id', id);
        if (error) throw error;
        CF.toast('Sessão atualizada!', 'success');
      } else {
        const { error } = await _sb.from('sessoes').insert(payload);
        if (error) throw error;
        CF.toast('Sessão agendada!', 'success');
      }
      fecharModal();
      await carregarSessoes();
    } catch (err) {
      CF.toast(`Erro: ${err.message}`, 'error');
    } finally {
      CF.loading(btn, false);
    }
  });

  // ── Excluir ──────────────────────────────────────────────────────────────
  document.getElementById('btn-excluir-sessao').addEventListener('click', async () => {
    const id = document.getElementById('sessao-id').value;
    if (!id || !confirm('Deseja excluir esta sessão?')) return;

    const { error } = await _sb.from('sessoes').delete().eq('id', id);
    if (error) { CF.toast('Erro ao excluir.', 'error'); return; }
    CF.toast('Sessão excluída.', 'info');
    fecharModal();
    await carregarSessoes();
  });
</script>

</body>
</html>
