<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClinFit — Financeiro</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/clinfit.js"></script>
</head>
<body>

<div class="layout">

  <!-- ══════════ SIDEBAR ══════════ -->
  <aside class="sidebar">
    <div class="sidebar__logo"><img src="assets/logo.png" alt="ClinFit" /></div>
    <div class="sidebar__user">
      <div class="sidebar__avatar" id="sidebar-avatar">U</div>
      <div>
        <div class="sidebar__username" id="sidebar-username">Carregando...</div>
        <div class="sidebar__role" id="sidebar-email"></div>
      </div>
    </div>
    <nav class="sidebar__nav">
      <a href="app.html"        class="nav-item" id="nav-dashboard">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
      <a href="clientes.html"   class="nav-item" id="nav-clientes">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Clientes</a>
      <a href="agenda.html"     class="nav-item" id="nav-agenda">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Agenda</a>
      <a href="financeiro.html" class="nav-item" id="nav-financeiro">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Financeiro</a>
      <a href="evolucao.html"   class="nav-item" id="nav-evolucao">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Evolução</a>
      <a href="configuracoes.html" class="nav-item" id="nav-configuracoes">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Configurações</a>
    </nav>
    <div class="sidebar__footer">
      <button class="btn-logout" id="btn-logout">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sair</button>
    </div>
  </aside>

  <!-- ══════════ MAIN ══════════ -->
  <main class="main">
    <div class="main-header">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="mobile-menu-btn" id="mobile-menu-btn">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <h1>Financeiro</h1>
          <p id="current-date"></p>
        </div>
      </div>
      <button class="btn btn-primary" id="btn-nova-cobranca">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nova Cobrança
      </button>
    </div>

    <div class="main-content">

      <!-- Navegação por mês -->
      <div class="month-nav mb-6">
        <button class="btn btn-outline btn-sm" id="btn-mes-ant">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span id="mes-label">—</span>
        <button class="btn btn-outline btn-sm" id="btn-mes-prox">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>

      <!-- Cards de resumo -->
      <div class="metrics-grid mb-6" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr))">
        <div class="metric-card">
          <div class="metric-icon green">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="metric-label">Total Recebido</div>
          <div class="metric-value" id="total-recebido" style="color:var(--green)">R$ 0,00</div>
          <div class="metric-sub" id="qtd-pago">0 cobranças pagas</div>
        </div>
        <div class="metric-card">
          <div class="metric-icon yellow">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <div class="metric-label">Total Pendente</div>
          <div class="metric-value" id="total-pendente" style="color:var(--yellow)">R$ 0,00</div>
          <div class="metric-sub" id="qtd-pendente">0 cobranças pendentes</div>
        </div>
      </div>

      <!-- Filtro e lista -->
      <div class="toolbar">
        <div class="search-box">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="busca-cob" class="form-control" placeholder="Buscar cliente ou descrição..." />
        </div>
        <select id="filtro-cob" class="form-control" style="width:auto">
          <option value="">Todos</option>
          <option value="pendente">Pendentes</option>
          <option value="pago">Pagos</option>
        </select>
      </div>

      <!-- Tabela de cobranças -->
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Cliente</th>
              <th>Descrição</th>
              <th>Tipo</th>
              <th>Vencimento</th>
              <th>Valor</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="lista-cobrancas">
            <tr><td colspan="7">
              <div class="empty-state"><div class="loader"></div><p>Carregando...</p></div>
            </td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </main>
</div>

<!-- ══════════ MODAL COBRANÇA ══════════ -->
<div class="modal-overlay" id="modal-cobranca">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-cob-title">Nova Cobrança</h2>
      <button class="modal-close" id="modal-cob-close">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="cob-id" />

      <div class="form-group">
        <label for="cob-cliente">Cliente *</label>
        <select id="cob-cliente" class="form-control">
          <option value="">Selecione um cliente...</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="cob-valor">Valor (R$) *</label>
          <input type="number" id="cob-valor" class="form-control" placeholder="0,00" min="0" step="0.01" />
        </div>
        <div class="form-group">
          <label for="cob-vencimento">Vencimento *</label>
          <input type="date" id="cob-vencimento" class="form-control" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="cob-tipo">Tipo</label>
          <select id="cob-tipo" class="form-control">
            <option value="mensalidade">Mensalidade</option>
            <option value="sessao_avulsa">Sessão Avulsa</option>
            <option value="pacote">Pacote</option>
            <option value="outro">Outro</option>
          </select>
        </div>
        <div class="form-group">
          <label for="cob-status">Status</label>
          <select id="cob-status" class="form-control">
            <option value="pendente">Pendente</option>
            <option value="pago">Pago</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="cob-descricao">Descrição</label>
        <input type="text" id="cob-descricao" class="form-control" placeholder="Ex: Mensalidade abril 2025" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="modal-cob-cancel">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar-cob">Salvar</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>

  let userId    = null;
  let clientes  = [];
  let cobrancas = [];
  let mesOffset = 0; // 0 = mês atual

  const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                 'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  (async () => {
    const auth = await CF.initPage('nav-financeiro');
    if (!auth) return;
    userId = auth.user.id;
    await carregarClientes();
    atualizarMes();
    await carregarCobrancas();
  })();

  // ── Mês ─────────────────────────────────────────────────────────────────
  function getMes() {
    const d = new Date();
    d.setMonth(d.getMonth() + mesOffset);
    return { ano: d.getFullYear(), mes: d.getMonth() + 1 };
  }

  function atualizarMes() {
    const { ano, mes } = getMes();
    document.getElementById('mes-label').textContent = `${MESES[mes - 1]} ${ano}`;
  }

  document.getElementById('btn-mes-ant').addEventListener('click', async () => {
    mesOffset--; atualizarMes(); await carregarCobrancas();
  });
  document.getElementById('btn-mes-prox').addEventListener('click', async () => {
    mesOffset++; atualizarMes(); await carregarCobrancas();
  });

  // ── Dados ────────────────────────────────────────────────────────────────
  async function carregarClientes() {
    const { data } = await _sb
      .from('clientes').select('id,nome').eq('usuario_id', userId).order('nome');
    clientes = data || [];

    const sel = document.getElementById('cob-cliente');
    sel.innerHTML = '<option value="">Selecione um cliente...</option>' +
      clientes.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
  }

  async function carregarCobrancas() {
    const tbody = document.getElementById('lista-cobrancas');

    // ── 1. Spinner imediato ───────────────────────────────────────────────
    tbody.innerHTML = `<tr><td colspan="7">
      <div class="empty-state"><div class="loader"></div><p>Carregando cobranças...</p></div>
    </td></tr>`;

    // ── 2. Intervalo do mês (último dia real — evita 31/04, 31/02 etc.) ──
    const { ano, mes } = getMes();
    const mm        = String(mes).padStart(2, '0');
    const inicio    = `${ano}-${mm}-01`;
    const ultimoDia = new Date(ano, mes, 0).getDate();
    const fim       = `${ano}-${mm}-${String(ultimoDia).padStart(2, '0')}`;

    // Diagnóstico — visível no console (F12)
    console.log('%c[ClinFit Financeiro]', 'color:#16a34a;font-weight:bold',
      'userId:', userId, '| período:', inicio, '→', fim);

    // ── 3. Query simples — select(*), sem join, filtra por usuario_id ─────
    let data, error;
    try {
      ({ data, error } = await _sb
        .from('cobrancas')
        .select('*')
        .eq('usuario_id', userId)
        .gte('vencimento', inicio)
        .lte('vencimento', fim)
        .order('vencimento'));
    } catch (e) {
      // Captura erros de rede / exceção JS inesperada
      console.error('[ClinFit] Exceção inesperada em carregarCobrancas:', e);
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">
        <p style="color:var(--red)">Erro de rede. Verifique sua conexão.</p></div></td></tr>`;
      CF.toast('Erro de rede ao carregar cobranças.', 'error');
      return;
    }

    // ── 4. Erro do Supabase — mostra detalhes completos ───────────────────
    if (error) {
      // Log completo para diagnóstico
      console.error('%c[ClinFit] Erro Supabase:', 'color:red;font-weight:bold', {
        message: error.message,
        code:    error.code,
        details: error.details,
        hint:    error.hint
      });

      // Toast com mensagem detalhada
      const msg = error.message || 'Erro desconhecido';
      CF.toast('Falha: ' + msg, 'error');

      // Tabela mostra o erro em vez de ficar travada no spinner
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">
        <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <p style="color:var(--red);margin-top:8px"><strong>Falha ao carregar</strong></p>
        <p style="font-size:12px;opacity:.7;margin-top:4px">${msg}<br>Abra o console (F12) para detalhes completos.</p>
      </div></td></tr>`;
      return;
    }

    console.log('%c[ClinFit]', 'color:#16a34a', data?.length ?? 0, 'cobranças carregadas');

    // ── 5. Resolve nomes via cliMap (sem depender de FK no banco) ─────────
    const cliMap = {};
    clientes.forEach(c => { cliMap[c.id] = c.nome; });

    cobrancas = (data || []).map(c => ({
      ...c,
      nomeCliente: cliMap[c.cliente_id] || '—'
    }));

    renderResumo();
    renderTabela(cobrancas);
  }

  function renderResumo() {
    const pagos    = cobrancas.filter(c => c.status === 'pago');
    const pendentes = cobrancas.filter(c => c.status === 'pendente');
    const totPago  = pagos.reduce((s, c) => s + +c.valor, 0);
    const totPend  = pendentes.reduce((s, c) => s + +c.valor, 0);

    document.getElementById('total-recebido').textContent = CF.currency(totPago);
    document.getElementById('total-pendente').textContent = CF.currency(totPend);
    document.getElementById('qtd-pago').textContent       = `${pagos.length} cobrança${pagos.length !== 1 ? 's' : ''} paga${pagos.length !== 1 ? 's' : ''}`;
    document.getElementById('qtd-pendente').textContent   = `${pendentes.length} cobrança${pendentes.length !== 1 ? 's' : ''} pendente${pendentes.length !== 1 ? 's' : ''}`;
  }

  function renderTabela(lista) {
    const tbody = document.getElementById('lista-cobrancas');

    if (!lista.length) {
      tbody.innerHTML = `<tr><td colspan="7">
        <div class="empty-state">
          <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          <p>Nenhuma cobrança neste mês</p>
        </div>
      </td></tr>`;
      return;
    }

    const tipoLabel = { mensalidade: 'Mensalidade', sessao_avulsa: 'Sessão Avulsa', pacote: 'Pacote', outro: 'Outro' };

    tbody.innerHTML = lista.map(c => `
      <tr class="fade-in">
        <td><strong>${c.nomeCliente || '—'}</strong></td>
        <td>${c.descricao || '—'}</td>
        <td><span class="badge badge-blue">${tipoLabel[c.tipo] || c.tipo}</span></td>
        <td>${CF.date(c.vencimento)}</td>
        <td style="font-weight:700">${CF.currency(c.valor)}</td>
        <td>
          <span class="badge ${c.status === 'pago' ? 'badge-green' : 'badge-yellow'}">
            ${c.status === 'pago' ? 'Pago' : 'Pendente'}
          </span>
        </td>
        <td>
          <div style="display:flex;gap:6px">
            ${c.status === 'pendente' ? `
              <button class="btn btn-primary btn-sm" onclick="marcarPago('${c.id}')" title="Marcar como pago">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                Pago
              </button>` : ''}
            <button class="btn btn-outline btn-sm" onclick="abrirEdicao('${c.id}')" title="Editar">
              <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="btn btn-danger btn-sm" onclick="excluir('${c.id}')" title="Excluir">
              <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
            </button>
          </div>
        </td>
      </tr>`).join('');
  }

  // ── Busca/filtro ─────────────────────────────────────────────────────────
  function filtrar() {
    const q  = document.getElementById('busca-cob').value.toLowerCase();
    const st = document.getElementById('filtro-cob').value;
    const lista = cobrancas.filter(c =>
      ((c.nomeCliente || '').toLowerCase().includes(q) || (c.descricao || '').toLowerCase().includes(q)) &&
      (!st || c.status === st)
    );
    renderTabela(lista);
  }

  document.getElementById('busca-cob').addEventListener('input', filtrar);
  document.getElementById('filtro-cob').addEventListener('change', filtrar);

  // ── Marcar como pago ─────────────────────────────────────────────────────
  window.marcarPago = async (id) => {
    const { error } = await _sb.from('cobrancas').update({ status: 'pago' }).eq('id', id);
    if (error) { CF.toast('Erro ao atualizar.', 'error'); return; }
    CF.toast('Cobrança marcada como paga!', 'success');
    await carregarCobrancas();
  };

  // ── Modal ─────────────────────────────────────────────────────────────────
  function abrirModal() { document.getElementById('modal-cobranca').classList.add('open'); }
  function fecharModal() {
    document.getElementById('modal-cobranca').classList.remove('open');
    limparForm();
  }

  function limparForm() {
    document.getElementById('cob-id').value         = '';
    document.getElementById('cob-cliente').value    = '';
    document.getElementById('cob-valor').value      = '';
    document.getElementById('cob-vencimento').value = new Date().toISOString().split('T')[0];
    document.getElementById('cob-tipo').value       = 'mensalidade';
    document.getElementById('cob-status').value     = 'pendente';
    document.getElementById('cob-descricao').value  = '';
    document.getElementById('modal-cob-title').textContent = 'Nova Cobrança';
  }

  document.getElementById('btn-nova-cobranca').addEventListener('click', () => { limparForm(); abrirModal(); });
  document.getElementById('modal-cob-close').addEventListener('click', fecharModal);
  document.getElementById('modal-cob-cancel').addEventListener('click', fecharModal);
  document.getElementById('modal-cobranca').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) fecharModal();
  });

  window.abrirEdicao = (id) => {
    const c = cobrancas.find(x => x.id === id);
    if (!c) return;
    document.getElementById('cob-id').value         = c.id;
    document.getElementById('cob-cliente').value    = c.cliente_id;
    document.getElementById('cob-valor').value      = c.valor;
    document.getElementById('cob-vencimento').value = c.vencimento;
    document.getElementById('cob-tipo').value       = c.tipo;
    document.getElementById('cob-status').value     = c.status;
    document.getElementById('cob-descricao').value  = c.descricao || '';
    document.getElementById('modal-cob-title').textContent = 'Editar Cobrança';
    abrirModal();
  };

  // ── Salvar ────────────────────────────────────────────────────────────────
  document.getElementById('btn-salvar-cob').addEventListener('click', async () => {
    const btn       = document.getElementById('btn-salvar-cob');
    const id        = document.getElementById('cob-id').value;
    const clienteId = document.getElementById('cob-cliente').value;
    const valor     = parseFloat(document.getElementById('cob-valor').value);
    const venc      = document.getElementById('cob-vencimento').value;

    if (!clienteId || !valor || !venc) {
      CF.toast('Preencha cliente, valor e vencimento.', 'error');
      return;
    }

    const payload = {
      usuario_id: userId,
      cliente_id: clienteId,
      valor,
      vencimento: venc,
      tipo:       document.getElementById('cob-tipo').value,
      status:     document.getElementById('cob-status').value,
      descricao:  document.getElementById('cob-descricao').value.trim() || null
    };

    CF.loading(btn, true);
    try {
      if (id) {
        const { error } = await _sb.from('cobrancas').update(payload).eq('id', id);
        if (error) throw error;
        CF.toast('Cobrança atualizada!', 'success');
      } else {
        const { error } = await _sb.from('cobrancas').insert(payload);
        if (error) throw error;
        CF.toast('Cobrança criada!', 'success');
      }
      fecharModal();
      await carregarCobrancas();
    } catch (err) {
      CF.toast(`Erro: ${err.message}`, 'error');
    } finally {
      CF.loading(btn, false);
    }
  });

  // ── Excluir ───────────────────────────────────────────────────────────────
  window.excluir = async (id) => {
    if (!confirm('Deseja excluir esta cobrança?')) return;
    const { error } = await _sb.from('cobrancas').delete().eq('id', id);
    if (error) { CF.toast('Erro ao excluir.', 'error'); return; }
    CF.toast('Cobrança excluída.', 'info');
    await carregarCobrancas();
  };
</script>

</body>
</html>
